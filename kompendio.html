<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#faf6f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kompendio">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23faf6f0'/><text x='90' y='118' font-family='serif' font-size='100' font-weight='900' text-anchor='middle' fill='%23c8472a'>K</text></svg>">
<title>Kompendio · Mikrolæring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800;9..144,900&family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf6f0;
  --bg-warm: #f4ede0;
  --ink: #1a1410;
  --ink-soft: #5a4a3c;
  --paper: #ffffff;
  --line: #e4d9c4;
  --line-strong: #c9b896;
  --accent: #c8472a;
  --accent-deep: #9a3520;
  --gold: #d4a444;
  --green: #4a7c4a;
  --green-soft: #e8f0e3;
  --red: #b54a3a;
  --red-soft: #f5e3df;
  --blue: #3a5a7a;
  --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 4px 12px rgba(60,40,20,0.06);
  --shadow-lift: 0 4px 0 rgba(0,0,0,0.08), 0 10px 24px rgba(60,40,20,0.12);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Geist', -apple-system, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
body {
  max-width: 460px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  background:
    radial-gradient(circle at 10% 5%, rgba(212,164,68,0.06), transparent 40%),
    radial-gradient(circle at 90% 95%, rgba(200,71,42,0.05), transparent 40%),
    var(--bg);
  background-attachment: fixed;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  -webkit-user-select: none;
  user-select: none;
}

/* Subtle paper grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.4;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.3 0 0 0 0 0.2 0 0 0 0.04 0'/></filter><rect width='100' height='100' filter='url(%23n)'/></svg>");
  z-index: 100;
}

/* ============= TOP BAR ============= */
.topbar {
  position: sticky; top: 0;
  background: rgba(250,246,240,0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 14px 20px;
  padding-top: max(14px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
  z-index: 50;
}
.brand {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: -0.02em;
  display: flex; align-items: baseline; gap: 6px;
}
.brand .dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
}
.stats {
  display: flex; gap: 14px;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  font-weight: 600;
}
.stat {
  display: flex; align-items: center; gap: 4px;
  color: var(--ink-soft);
}
.stat svg { width: 16px; height: 16px; }
.stat.streak { color: var(--accent); }
.stat.xp { color: var(--gold); }

/* ============= HOMEPAGE ============= */
.page { padding: 20px 16px 100px; }
.intro {
  margin: 8px 4px 24px;
}
.intro h1 {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: 32px;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin: 0 0 8px;
}
.intro h1 em {
  font-style: italic;
  color: var(--accent);
  font-weight: 600;
}
.intro p {
  color: var(--ink-soft);
  font-size: 15px;
  margin: 0;
}

.path-section {
  margin-bottom: 32px;
}
.path-header {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 4px 16px;
}
.path-num {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 28px;
  font-style: italic;
  color: var(--line-strong);
  line-height: 1;
}
.path-title {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: -0.01em;
}
.path-progress {
  margin-left: auto;
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  color: var(--ink-soft);
  background: var(--bg-warm);
  padding: 4px 8px;
  border-radius: 100px;
  border: 1px solid var(--line);
}

/* Lesson nodes - vertical staircase */
.lessons {
  position: relative;
  padding: 8px 0;
}
.lesson-node {
  display: flex; align-items: center;
  margin-bottom: 14px;
  position: relative;
}
.lesson-node:nth-child(odd) { padding-left: 24px; }
.lesson-node:nth-child(even) { padding-left: 56px; }
.lesson-node:nth-child(3n) { padding-left: 88px; }

.lesson-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--paper);
  border: 2px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 4px 0 var(--ink);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: 22px;
}
.lesson-circle:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 var(--ink);
}
.lesson-circle.done {
  background: var(--green);
  color: white;
  border-color: #2a5a2a;
  box-shadow: 0 4px 0 #2a5a2a;
}
.lesson-circle.current {
  background: var(--accent);
  color: white;
  border-color: var(--accent-deep);
  box-shadow: 0 4px 0 var(--accent-deep);
  animation: pulse 2s ease-in-out infinite;
}
.lesson-circle.locked {
  background: var(--bg-warm);
  color: var(--line-strong);
  border-color: var(--line-strong);
  box-shadow: 0 4px 0 var(--line-strong);
  cursor: not-allowed;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}
.lesson-label {
  margin-left: 14px;
  flex: 1;
}
.lesson-label .name {
  font-weight: 600;
  font-size: 14px;
  line-height: 1.25;
}
.lesson-label .meta {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--ink-soft);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ============= LESSON SCREEN ============= */
.lesson-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  display: none;
  flex-direction: column;
  max-width: 460px;
  margin: 0 auto;
  overflow: hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
.lesson-screen.active { display: flex; }

.lesson-header {
  padding: 14px 16px 12px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}
.close-btn {
  background: transparent;
  border: none;
  font-size: 26px;
  color: var(--ink-soft);
  cursor: pointer;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
}
.close-btn:active { background: var(--bg-warm); }

.progress-bar {
  flex: 1;
  height: 12px;
  background: var(--bg-warm);
  border-radius: 100px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green) 0%, #6a9d6a 100%);
  border-radius: 100px;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.hearts {
  display: flex; gap: 2px;
  font-size: 18px;
}
.heart {
  filter: grayscale(0%);
  transition: all 0.3s;
}
.heart.lost {
  filter: grayscale(100%);
  opacity: 0.3;
}

.lesson-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 20px;
  display: flex;
  flex-direction: column;
}

.q-type-tag {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  margin-bottom: 8px;
}

.q-prompt {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 22px;
  line-height: 1.25;
  letter-spacing: -0.015em;
  margin: 0 0 24px;
}

/* Multiple choice */
.choices {
  display: flex; flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.choice {
  background: var(--paper);
  border: 2px solid var(--line);
  border-bottom-width: 4px;
  border-radius: 14px;
  padding: 16px 18px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  text-align: left;
  font-family: inherit;
  color: var(--ink);
  transition: all 0.1s ease;
  display: flex; align-items: center; gap: 12px;
  line-height: 1.35;
}
.choice:active {
  transform: translateY(1px);
  border-bottom-width: 3px;
}
.choice.selected {
  border-color: var(--blue);
  background: #eef3f8;
}
.choice.correct {
  border-color: var(--green);
  background: var(--green-soft);
}
.choice.wrong {
  border-color: var(--red);
  background: var(--red-soft);
}
.choice-letter {
  width: 26px; height: 26px;
  border: 1.5px solid var(--line-strong);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
  color: var(--ink-soft);
}
.choice.selected .choice-letter { border-color: var(--blue); color: var(--blue); }
.choice.correct .choice-letter { border-color: var(--green); color: var(--green); background: var(--green); color: white; }
.choice.wrong .choice-letter { border-color: var(--red); color: var(--red); background: var(--red); color: white; }

/* Cloze */
.cloze-container {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 20px 18px;
  font-family: 'Fraunces', serif;
  font-size: 19px;
  line-height: 1.7;
  margin-bottom: 16px;
}
.cloze-blank {
  display: inline-block;
  min-width: 100px;
  padding: 4px 10px;
  margin: 0 2px;
  background: var(--bg-warm);
  border-bottom: 2px dashed var(--line-strong);
  text-align: center;
  font-family: 'Geist Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  border-radius: 4px 4px 0 0;
  vertical-align: baseline;
}
.cloze-blank.empty {
  color: var(--line-strong);
  font-style: italic;
}
.cloze-bank {
  display: flex; flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
  margin-bottom: 16px;
}
.cloze-pill {
  background: var(--paper);
  border: 2px solid var(--line);
  border-bottom-width: 3px;
  padding: 8px 14px;
  border-radius: 100px;
  cursor: pointer;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  transition: transform 0.1s;
}
.cloze-pill:active { transform: translateY(1px); }
.cloze-pill.used {
  opacity: 0.3;
  pointer-events: none;
  background: var(--bg-warm);
}

/* Matching */
.match-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.match-col h4 {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin: 0 0 8px;
  letter-spacing: 0.1em;
}
.match-item {
  background: var(--paper);
  border: 2px solid var(--line);
  border-bottom-width: 3px;
  padding: 12px 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.3;
  transition: all 0.1s;
  min-height: 50px;
  display: flex; align-items: center;
}
.match-item:active { transform: translateY(1px); }
.match-item.selected {
  border-color: var(--blue);
  background: #eef3f8;
}
.match-item.matched {
  background: var(--green-soft);
  border-color: var(--green);
  opacity: 0.6;
  pointer-events: none;
}
.match-item.wrong-flash {
  background: var(--red-soft);
  border-color: var(--red);
  animation: shake 0.3s;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* Feedback panel */
.feedback {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%;
  max-width: 460px;
  padding: 20px 20px 24px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  background: var(--paper);
  border-top: 2px solid var(--line);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 60;
}
.feedback.show { transform: translateX(-50%) translateY(0); }
.feedback.correct {
  background: var(--green-soft);
  border-top-color: var(--green);
}
.feedback.wrong {
  background: var(--red-soft);
  border-top-color: var(--red);
}
.feedback-title {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: 20px;
  margin: 0 0 6px;
}
.feedback.correct .feedback-title { color: var(--green); }
.feedback.wrong .feedback-title { color: var(--red); }
.feedback-explain {
  font-size: 14px;
  color: var(--ink-soft);
  margin: 0 0 14px;
  line-height: 1.45;
}
.feedback-source {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
  margin-bottom: 12px;
  opacity: 0.7;
}

/* Buttons */
.btn {
  font-family: inherit;
  font-weight: 600;
  font-size: 16px;
  padding: 14px 22px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  width: 100%;
  letter-spacing: 0.01em;
  transition: transform 0.1s;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--ink);
  color: var(--bg);
  border-bottom: 4px solid #000;
}
.btn-primary:disabled {
  background: var(--line);
  color: var(--line-strong);
  border-bottom-color: var(--line-strong);
  cursor: not-allowed;
}
.btn-correct {
  background: var(--green);
  color: white;
  border-bottom: 4px solid #2a5a2a;
}
.btn-wrong {
  background: var(--red);
  color: white;
  border-bottom: 4px solid #7a2a20;
}
.bottom-action {
  padding: 16px 20px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 1px solid var(--line);
}

/* ============= INTRO CARD ============= */
.intro-card {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 18px;
  padding: 24px 22px;
  box-shadow: 0 6px 0 var(--ink);
  margin-bottom: 16px;
}
.intro-card .badge {
  display: inline-block;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  background: var(--accent);
  color: white;
  padding: 4px 10px;
  border-radius: 100px;
  margin-bottom: 12px;
  font-weight: 600;
}
.intro-card h2 {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: 26px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin: 0 0 14px;
}
.intro-card .body {
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
}
.intro-card .body strong {
  background: linear-gradient(180deg, transparent 60%, rgba(212,164,68,0.4) 60%);
  font-weight: 700;
  padding: 0 2px;
}
.intro-card .analogy {
  margin-top: 16px;
  padding: 14px 14px;
  background: var(--bg-warm);
  border-left: 3px solid var(--gold);
  border-radius: 0 8px 8px 0;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.5;
}
.intro-card .analogy::before {
  content: "Analogi → ";
  font-family: 'Geist Mono', monospace;
  font-style: normal;
  font-weight: 600;
  color: var(--gold);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  display: block;
  margin-bottom: 4px;
}

/* ============= COMPLETE SCREEN ============= */
.complete-screen {
  text-align: center;
  padding: 40px 20px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  flex: 1;
}
.complete-emoji {
  font-size: 80px;
  margin-bottom: 16px;
  animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes bounceIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.complete-title {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 32px;
  letter-spacing: -0.02em;
  margin: 0 0 8px;
}
.complete-sub {
  color: var(--ink-soft);
  font-size: 15px;
  margin-bottom: 28px;
}
.complete-stats {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
}
.complete-stat {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-bottom-width: 4px;
  border-radius: 14px;
  padding: 14px 18px;
  min-width: 90px;
}
.complete-stat .num {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: 28px;
  line-height: 1;
  color: var(--accent);
}
.complete-stat .label {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* Summary card */
.summary-points {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 16px 18px;
  margin-top: 16px;
  text-align: left;
  width: 100%;
}
.summary-points h3 {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  margin: 0 0 10px;
  font-weight: 700;
}
.summary-points ul {
  margin: 0; padding-left: 20px;
  font-size: 13px;
  color: var(--ink-soft);
  line-height: 1.6;
}
.summary-points li { margin-bottom: 4px; }

/* ============= MODAL & TOAST ============= */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(20, 14, 10, 0.55);
  z-index: 300;
  display: none;
  align-items: center; justify-content: center;
  padding: 20px;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s;
}
.modal-backdrop.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 18px;
  padding: 24px 22px;
  max-width: 380px;
  width: 100%;
  box-shadow: 0 8px 0 var(--ink);
  animation: slideUp 0.25s cubic-bezier(0.34, 1.3, 0.64, 1);
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal h3 {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: 22px;
  margin: 0 0 8px;
  letter-spacing: -0.015em;
}
.modal p {
  color: var(--ink-soft);
  font-size: 14px;
  line-height: 1.5;
  margin: 0 0 20px;
}
.modal-actions {
  display: flex; gap: 10px;
}
.modal-actions .btn { flex: 1; padding: 12px 16px; font-size: 15px; }
.btn-secondary {
  background: var(--bg-warm);
  color: var(--ink);
  border-bottom: 4px solid var(--line-strong);
}
.btn-danger {
  background: var(--red);

/* Toast */
.toast {
  position: fixed;
  top: max(16px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%) translateY(-120%);
  background: var(--ink);
  color: var(--bg);
  padding: 12px 18px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  z-index: 400;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  transition: transform 0.3s cubic-bezier(0.34, 1.3, 0.64, 1);
  max-width: 340px;
  text-align: center;
  font-family: 'Geist', sans-serif;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.warn { background: var(--accent); color: white; }
.toast.info { background: var(--blue); color: white; }

/* Storage status pill (visible if storage fails) */
.storage-warn {
  display: none;
  background: var(--accent);
  color: white;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  padding: 8px 14px;

  letter-spacing: 0.02em;
  border-radius: 8px;
  margin: 8px 16px 0;
  line-height: 1.4;
}
.storage-warn.show { display: block; }

/* ============= MISC ============= */
.section-intro {

  z-index: 40;
}
@media (max-width: 460px) {

// ============================================================
// STORAGE LAYER — robust med fallback
// ============================================================

const STATE_KEY = 'kompendio_state_v1';
let storageMode = 'unknown'; // 'localStorage', 'memory', 'broken'
let memoryStore = {};

function detectStorage() {
  // Test if localStorage actually works (writes AND reads back)
  try {
    const testKey = '__kompendio_test__';
    localStorage.setItem(testKey, '1');
    const got = localStorage.getItem(testKey);
    localStorage.removeItem(testKey);
    if (got === '1') {
      storageMode = 'localStorage';
      return true;
    }
  } catch(e) {
    // SecurityError in private mode, etc.
  }
  storageMode = 'memory';
  return false;
}

function storageGet(key) {
  if (storageMode === 'localStorage') {
    try { return localStorage.getItem(key); } catch(e) { return null; }
  }
  return memoryStore[key] || null;
}
function storageSet(key, value) {
  if (storageMode === 'localStorage') {
    try {
      localStorage.setItem(key, value);
      return true;
    } catch(e) {
      // QuotaExceeded or storage broken — fall back
      storageMode = 'memory';
      showStorageWarning('Ikke nok lagringsplass. Fremgang er midlertidig.');
      memoryStore[key] = value;
      return false;
    }
  }
  // unknown or memory mode — store in memory
  storageMode = 'memory';
  memoryStore[key] = value;
  return false;
}
function storageRemove(key) {
  if (storageMode === 'localStorage') {
    try { localStorage.removeItem(key); } catch(e) {}
  }
  delete memoryStore[key];
}

function showStorageWarning(detail) {
  const el = document.getElementById('storageWarn');
  const dt = document.getElementById('storageWarnDetail');
  if (!el) return;
  if (detail) dt.textContent = detail;
  else if (storageMode === 'memory') {
    dt.textContent = 'Åpne filen direkte i Safari/Chrome (ikke privat-modus).';
  }
  el.classList.add('show');
}

  if (saved) {
    try {

      // Merge in saved values, keep defaults for missing keys
      state = {
        xp: typeof parsed.xp === 'number' ? parsed.xp : 0,
        streak: typeof parsed.streak === 'number' ? parsed.streak : 0,
        lastActiveDate: parsed.lastActiveDate || null,
        completedLessons: parsed.completedLessons || {},
        lessonProgress: parsed.lessonProgress || {},
        version: parsed.version || 1
      };
    } catch(e) {
      console.warn('Korrupt state, nullstiller', e);
      // Don't wipe — just keep defaults
    }
  }
  rolloverStreak();
}

function saveState() {
  return storageSet(STATE_KEY, JSON.stringify(state));
}

// Streak: only counts if user completes at least one lesson on a given day.
// If they skip a day, streak resets next time they're active.
function rolloverStreak() {
  if (!state.lastActiveDate) return;
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastActiveDate !== today && state.lastActiveDate !== yesterday) {
    // Missed a day — reset (but don't clear lastActiveDate so we know they used to be active)
    state.streak = 0;
    saveState();
  }
}

function markActive() {
  const today = new Date().toDateString();
  if (state.lastActiveDate === today) return; // already counted today
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastActiveDate === yesterday) {
    state.streak += 1;
  } else {
    state.streak = 1;
  }
  state.lastActiveDate = today;
  saveState();
}

function renderTopbar() {
  document.getElementById('streakNum').textContent = state.streak;
  document.getElementById('xpNum').textContent = state.xp;
}

function showModal({ title, body, actions }) {
  const backdrop = document.getElementById('modalBackdrop');
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  const actionsEl = document.getElementById('modalActions');
  actionsEl.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + (a.style || 'btn-primary');
    btn.textContent = a.label;
    btn.onclick = () => {
      backdrop.classList.remove('show');
      if (a.onClick) a.onClick();
    };
    actionsEl.appendChild(btn);
  });
  backdrop.classList.add('show');
}

let toastTimer = null;
function showToast(message, kind = '') {
  const el = document.getElementById('toast');
  el.className = 'toast ' + kind;
  el.textContent = message;
  // Reflow to retrigger animation
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ============================================================
// HOMEPAGE — RENDER PATHS
// ============================================================

function getAllLessons() {
  // Sort all lessons globally by order field
  return CURRICULUM.paths.flatMap(p => p.lessons).sort((a, b) => (a.order || 999) - (b.order || 999));
}

function getPathLessonsSorted(path) {
  return [...path.lessons].sort((a, b) => (a.order || 999) - (b.order || 999));
}

function isLessonUnlocked(lessonId) {
  const all = getAllLessons();
  const idx = all.findIndex(l => l.id === lessonId);
  if (idx === 0) return true;
  const prev = all[idx - 1];
  // Standard rule: previous must be done
  if (state.completedLessons[prev.id]) return true;
  // Migration rule: if user has completed ANY later lesson, keep this one unlocked too
  // (This protects users who completed lessons before new ones were added)
  for (let j = idx; j < all.length; j++) {
    if (state.completedLessons[all[j].id]) return true;
  }
  return false;
}

function renderHomePage() {
  const container = document.getElementById('pathContainer');
  container.innerHTML = '';

  CURRICULUM.paths.forEach((path, pIdx) => {
    const sortedLessons = getPathLessonsSorted(path);
    const completedInPath = sortedLessons.filter(l => state.completedLessons[l.id]).length;
    const total = sortedLessons.length;

    const section = document.createElement('div');
    section.className = 'path-section';
    section.innerHTML = `
      <div class="path-header">
        <div class="path-num">0${pIdx + 1}</div>
        <div>
          <div class="path-title">${path.title}</div>
        </div>
        <div class="path-progress">${completedInPath}/${total}</div>
      </div>
      <div class="section-intro">${path.intro}</div>
      <div class="lessons" id="lessons-${path.id}"></div>
    `;
    container.appendChild(section);

    const lessonsEl = section.querySelector('.lessons');
    sortedLessons.forEach((lesson, lIdx) => {
      const isDone = !!state.completedLessons[lesson.id];
      const unlocked = isLessonUnlocked(lesson.id);
      const all = getAllLessons();
      const allBefore = all.slice(0, all.findIndex(l => l.id === lesson.id));
      const isCurrent = unlocked && !isDone && allBefore.every(l => state.completedLessons[l.id]);

      const node = document.createElement('div');
      node.className = 'lesson-node';
      let circleClass = 'locked';
      if (isDone) circleClass = 'done';
      else if (isCurrent) circleClass = 'current';
      else if (unlocked) circleClass = '';

      const inProgress = !isDone && hasResumableProgress(lesson.id);
      const circleContent = isDone ? '✓' : (lIdx + 1);
      const metaText = inProgress
        ? `${lesson.source} · I gang ↻`
        : lesson.source;
      node.innerHTML = `
        <div class="lesson-circle ${circleClass}" data-lesson-id="${lesson.id}">${circleContent}</div>
        <div class="lesson-label">
          <div class="name">${lesson.title}</div>
          <div class="meta">${metaText}</div>
        </div>
      `;
      lessonsEl.appendChild(node);

      const circle = node.querySelector('.lesson-circle');
      circle.addEventListener('click', () => {
        if (circleClass === 'locked') {
          showToast('Fullfør forrige leksjon først', 'warn');
          return;
        }
        startLesson(lesson.id);
      });
    });
  });
}

// ============================================================
// LESSON PLAYER
// ============================================================

let currentLesson = null;
let currentQIdx = 0;
let currentAnswerData = null;
let questionsCorrect = 0;
let questionsTotal = 0;
let currentHearts = 3;

// Save in-lesson progress so user can resume after closing
function saveLessonProgress() {
  if (!currentLesson) return;
  if (currentQIdx < 0 || currentQIdx >= currentLesson.questions.length) {
    // Don't save intro state or completed state — let user start fresh / view home
    clearLessonProgress(currentLesson.id);
    return;
  }
  state.lessonProgress[currentLesson.id] = {
    qIdx: currentQIdx,
    hearts: currentHearts,
    correct: questionsCorrect,
    total: questionsTotal,
    savedAt: Date.now()
  };
  saveState();
}
function clearLessonProgress(lessonId) {
  delete state.lessonProgress[lessonId];
  saveState();
}
function hasResumableProgress(lessonId) {
  return !!state.lessonProgress[lessonId];
}

function startLesson(lessonId, options = {}) {
  const all = getAllLessons();
  currentLesson = all.find(l => l.id === lessonId);
  if (!currentLesson) return;

  const resume = state.lessonProgress[lessonId];
  if (resume && !options.fresh) {
    currentQIdx = resume.qIdx;
    currentHearts = resume.hearts;
    questionsCorrect = resume.correct;
    questionsTotal = resume.total;
  } else {
    currentQIdx = -1; // intro screen
    currentHearts = 3;
    questionsCorrect = 0;
    questionsTotal = 0;
  }

  document.getElementById('lessonScreen').classList.add('active');
  renderHearts();
  renderCurrentScreen();
}

function closeLesson() {
  // Save progress automatically — no data loss
  saveLessonProgress();
  document.getElementById('lessonScreen').classList.remove('active');
  hideFeedback();
  currentLesson = null;
  renderHomePage();
  renderTopbar();
}

function renderHearts() {
  const el = document.getElementById('heartsDisplay');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const h = document.createElement('span');
    h.className = 'heart' + (i >= currentHearts ? ' lost' : '');
    h.textContent = '❤';
    el.appendChild(h);
  }
}

function updateProgressBar() {
  const total = currentLesson.questions.length + 1; // +1 for intro
  const done = currentQIdx + 1;
  const pct = Math.max(0, Math.min(100, (done / total) * 100));
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderCurrentScreen() {
  hideFeedback();
  updateProgressBar();
  const body = document.getElementById('lessonBody');
  body.innerHTML = '';
  document.getElementById('bottomAction').style.display = 'none';

  if (currentQIdx === -1) {
    renderIntro();
  } else if (currentQIdx >= currentLesson.questions.length) {
    renderComplete();
  } else {
    renderQuestion(currentLesson.questions[currentQIdx]);
  }
}

function renderIntro() {
  const intro = currentLesson.intro;
  const body = document.getElementById('lessonBody');
  const card = document.createElement('div');
  card.className = 'intro-card';
  card.innerHTML = `
    <div class="badge">${intro.badge}</div>
    <h2>${intro.heading}</h2>
    <div class="body">${intro.body}</div>
    ${intro.analogy ? `<div class="analogy">${intro.analogy}</div>` : ''}
  `;
  body.appendChild(card);

  document.getElementById('bottomAction').style.display = 'block';
  const checkBtn = document.getElementById('checkBtn');
  checkBtn.textContent = 'Start spørsmål';
  checkBtn.disabled = false;
  checkBtn.className = 'btn btn-primary';
  checkBtn.onclick = () => {
    currentQIdx = 0;
    renderCurrentScreen();
  };
}

function renderQuestion(q) {
  const body = document.getElementById('lessonBody');
  const tag = document.createElement('div');
  tag.className = 'q-type-tag';
  const tagMap = { mc: 'Velg riktig svar', cloze: 'Fyll inn ordene', match: 'Match parene' };
  tag.textContent = `${currentQIdx + 1} av ${currentLesson.questions.length} · ${tagMap[q.type]}`;
  body.appendChild(tag);

  const prompt = document.createElement('h2');
  prompt.className = 'q-prompt';
  prompt.textContent = q.prompt;
  body.appendChild(prompt);

  if (q.type === 'mc') renderMC(q);
  else if (q.type === 'cloze') renderCloze(q);
  else if (q.type === 'match') renderMatch(q);
}

// ---------- MULTIPLE CHOICE ----------
function renderMC(q) {
  const body = document.getElementById('lessonBody');
  const wrap = document.createElement('div');
  wrap.className = 'choices';
  const letters = ['A', 'B', 'C', 'D', 'E'];
  let selectedIdx = null;

  q.choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<div class="choice-letter">${letters[idx]}</div><div>${choice}</div>`;
    btn.onclick = () => {
      if (currentAnswerData && currentAnswerData.locked) return;
      wrap.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
      selectedIdx = idx;
      currentAnswerData = { type: 'mc', selected: idx, locked: false };
      document.getElementById('checkBtn').disabled = false;
    };
    wrap.appendChild(btn);
  });
  body.appendChild(wrap);

  currentAnswerData = { type: 'mc', selected: null, locked: false };
  document.getElementById('bottomAction').style.display = 'block';
  const checkBtn = document.getElementById('checkBtn');
  checkBtn.textContent = 'Sjekk';
  checkBtn.disabled = true;
  checkBtn.className = 'btn btn-primary';
  checkBtn.onclick = () => checkMC(q, wrap);
}

function checkMC(q, wrap) {
  if (currentAnswerData.selected === null) return;
  currentAnswerData.locked = true;
  const correct = currentAnswerData.selected === q.correct;
  const choices = wrap.querySelectorAll('.choice');
  choices.forEach((el, idx) => {
    if (idx === q.correct) el.classList.add('correct');
    else if (idx === currentAnswerData.selected) el.classList.add('wrong');
    el.style.pointerEvents = 'none';
  });
  showFeedback(correct, q.explain);
}

// ---------- CLOZE ----------
function renderCloze(q) {
  const body = document.getElementById('lessonBody');
  const container = document.createElement('div');
  container.className = 'cloze-container';

  // Build text with blanks as inline placeholders
  const filled = {}; // blankId -> word
  let textHTML = q.text;
  q.blanks.forEach(b => {
    textHTML = textHTML.replace(`___${b.id}___`,
      `<span class="cloze-blank empty" data-blank-id="${b.id}">…</span>`);
  });
  container.innerHTML = textHTML;
  body.appendChild(container);

  // Bank
  const bank = document.createElement('div');
  bank.className = 'cloze-bank';
  // Shuffle the bank a little but deterministic per question
  const shuffled = [...q.bank];
  bank.innerHTML = '';
  shuffled.forEach(word => {
    const pill = document.createElement('button');
    pill.className = 'cloze-pill';
    pill.textContent = word;
    pill.dataset.word = word;
    pill.onclick = () => {
      if (currentAnswerData && currentAnswerData.locked) return;
      // Find first empty blank
      const emptyBlank = container.querySelector('.cloze-blank.empty');
      if (!emptyBlank) {
        // Replace last filled
        const filledBlanks = container.querySelectorAll('.cloze-blank:not(.empty)');
        if (filledBlanks.length > 0) {
          const last = filledBlanks[filledBlanks.length - 1];
          const oldWord = last.textContent;
          // Restore old word to bank
          const usedPill = bank.querySelector(`.cloze-pill.used[data-word="${oldWord}"]`);
          if (usedPill) usedPill.classList.remove('used');
          last.classList.add('empty');
          last.textContent = '…';
          delete filled[last.dataset.blankId];
        }
        return;
      }
      pill.classList.add('used');
      emptyBlank.classList.remove('empty');
      emptyBlank.textContent = word;
      filled[emptyBlank.dataset.blankId] = word;
      currentAnswerData = { type: 'cloze', filled, locked: false };
      checkClozeReady();
    };
    bank.appendChild(pill);
  });
  body.appendChild(bank);

  // Tap a filled blank to remove it
  container.querySelectorAll('.cloze-blank').forEach(blank => {
    blank.style.cursor = 'pointer';
    blank.onclick = () => {
      if (currentAnswerData && currentAnswerData.locked) return;
      if (blank.classList.contains('empty')) return;
      const word = blank.textContent;
      const usedPill = bank.querySelector(`.cloze-pill.used[data-word="${word}"]`);
      if (usedPill) usedPill.classList.remove('used');
      blank.classList.add('empty');
      blank.textContent = '…';
      delete filled[blank.dataset.blankId];
      checkClozeReady();
    };
  });

  currentAnswerData = { type: 'cloze', filled, locked: false };
  document.getElementById('bottomAction').style.display = 'block';
  const checkBtn = document.getElementById('checkBtn');
  checkBtn.textContent = 'Sjekk';
  checkBtn.disabled = true;
  checkBtn.className = 'btn btn-primary';
  checkBtn.onclick = () => checkCloze(q, container);

  function checkClozeReady() {
    const allFilled = q.blanks.every(b => filled[b.id]);
    document.getElementById('checkBtn').disabled = !allFilled;
  }
}

function checkCloze(q, container) {
  currentAnswerData.locked = true;
  let allCorrect = true;
  q.blanks.forEach(b => {
    const blankEl = container.querySelector(`.cloze-blank[data-blank-id="${b.id}"]`);
    const userAns = (currentAnswerData.filled[b.id] || '').trim();
    if (userAns.toLowerCase() === b.answer.toLowerCase()) {
      blankEl.style.background = 'var(--green-soft)';
      blankEl.style.color = 'var(--green)';
      blankEl.style.borderBottomColor = 'var(--green)';
    } else {
      blankEl.style.background = 'var(--red-soft)';
      blankEl.style.color = 'var(--red)';
      blankEl.style.borderBottomColor = 'var(--red)';
      blankEl.textContent = b.answer;
      allCorrect = false;
    }
  });
  showFeedback(allCorrect, q.explain);
}

// ---------- MATCH ----------
function renderMatch(q) {
  const body = document.getElementById('lessonBody');
  const wrap = document.createElement('div');
  wrap.className = 'match-container';

  const leftCol = document.createElement('div');
  leftCol.className = 'match-col';
  leftCol.innerHTML = '<h4>Begrep</h4>';
  const rightCol = document.createElement('div');
  rightCol.className = 'match-col';
  rightCol.innerHTML = '<h4>Beskrivelse</h4>';

  // Shuffle right side
  const rightShuffled = [...q.right].sort(() => Math.random() - 0.5);
  // (Left stays as-is for predictability)

  let selectedSide = null;
  let selectedId = null;
  let matched = {};
  const totalPairs = q.left.length;

  q.left.forEach(item => {
    const el = document.createElement('div');
    el.className = 'match-item';
    el.dataset.side = 'left';
    el.dataset.id = item.id;
    el.textContent = item.text;
    el.onclick = () => handleMatchClick(el, 'left', item.id);
    leftCol.appendChild(el);
  });
  rightShuffled.forEach(item => {
    const el = document.createElement('div');
    el.className = 'match-item';
    el.dataset.side = 'right';
    el.dataset.id = item.id;
    el.textContent = item.text;
    el.onclick = () => handleMatchClick(el, 'right', item.id);
    rightCol.appendChild(el);
  });

  wrap.appendChild(leftCol);
  wrap.appendChild(rightCol);
  body.appendChild(wrap);

  function handleMatchClick(el, side, id) {
    if (currentAnswerData && currentAnswerData.locked) return;
    if (el.classList.contains('matched')) return;

    if (selectedSide === null) {
      el.classList.add('selected');
      selectedSide = side;
      selectedId = id;
      return;
    }
    if (selectedSide === side) {
      // Deselect previous and select new
      wrap.querySelectorAll('.match-item.selected').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      selectedId = id;
      return;
    }
    // Different sides — check match
    if (id === selectedId) {
      // Correct
      const otherSide = wrap.querySelector(`.match-item.selected`);
      otherSide.classList.remove('selected');
      otherSide.classList.add('matched');
      el.classList.add('matched');
      matched[id] = true;
      selectedSide = null; selectedId = null;
      if (Object.keys(matched).length === totalPairs) {
        currentAnswerData = { type: 'match', allCorrect: true, locked: true };
        showFeedback(true, q.explain);
      }
    } else {
      // Wrong — flash but don't lose hearts (matching is exploratory)
      const prev = wrap.querySelector(`.match-item.selected`);
      el.classList.add('wrong-flash');
      prev.classList.add('wrong-flash');
      setTimeout(() => {
        el.classList.remove('wrong-flash');
        prev.classList.remove('wrong-flash', 'selected');
      }, 400);
      selectedSide = null; selectedId = null;
    }
  }

  currentAnswerData = { type: 'match', allCorrect: false, locked: false };
}

function loseHeart() {
  currentHearts = Math.max(0, currentHearts - 1);
  renderHearts();
  if (currentHearts === 0) {
    setTimeout(() => {
      hideFeedback();
      showModal({
        title: 'Tom for liv 💔',
        body: 'Du brukte opp alle livene dine. Vil du prøve leksjonen på nytt?',
        actions: [
          {
            label: 'Tilbake',
            style: 'btn-secondary',
            onClick: () => {
              clearLessonProgress(currentLesson.id);
              closeLesson();
            }
          },
          {
            label: 'Prøv igjen',
            style: 'btn-primary',
            onClick: () => {
              const id = currentLesson.id;
              clearLessonProgress(id);
              startLesson(id, { fresh: true });
            }
          }
        ]
      });
    }, 600);
  }
}

// ---------- FEEDBACK ----------
function showFeedback(correct, explain) {
  questionsTotal++;
  if (correct) questionsCorrect++;
  else loseHeart();

  const fb = document.getElementById('feedback');
  fb.classList.remove('correct', 'wrong');
  fb.classList.add(correct ? 'correct' : 'wrong');
  document.getElementById('feedbackTitle').textContent = correct ? 'Riktig!' : 'Ikke helt';
  document.getElementById('feedbackExplain').textContent = explain || '';
  document.getElementById('feedbackSource').textContent = `Kilde: ${currentLesson.source}`;
  const cont = document.getElementById('continueBtn');
  cont.className = 'btn ' + (correct ? 'btn-correct' : 'btn-wrong');
  cont.textContent = 'Fortsett';
  cont.onclick = () => {
    currentQIdx++;
    renderCurrentScreen();
  };
  fb.classList.add('show');
  document.getElementById('bottomAction').style.display = 'none';
}
function hideFeedback() {
  document.getElementById('feedback').classList.remove('show');
}

// ---------- COMPLETE SCREEN ----------
function renderComplete() {
  const body = document.getElementById('lessonBody');
  const xpEarned = Math.round((questionsCorrect / questionsTotal) * 20);
  const heartsLeft = currentHearts;
  const isFirstCompletion = !state.completedLessons[currentLesson.id];

  // Save completion (overwrites earlier — keeps latest score)
  state.completedLessons[currentLesson.id] = {
    score: questionsCorrect,
    total: questionsTotal,
    hearts: heartsLeft,
    completedAt: Date.now()
  };
  // Only award XP first time (or partial on improvement?). Keep it simple: full XP each time.
  if (isFirstCompletion) state.xp += xpEarned;
  markActive();
  // Clear in-progress save since lesson is done
  delete state.lessonProgress[currentLesson.id];
  const saved = saveState();
  if (!saved && storageMode === 'memory') {
    showToast('Fremgang lagret midlertidig (ikke vedvarende)', 'warn');
  }

  body.innerHTML = `
    <div class="complete-screen">
      <div class="complete-emoji">${heartsLeft === 3 ? '🏆' : heartsLeft >= 1 ? '✨' : '💪'}</div>
      <h2 class="complete-title">Leksjon fullført!</h2>
      <p class="complete-sub">${currentLesson.title}</p>
      <div class="complete-stats">
        <div class="complete-stat">
          <div class="num">+${xpEarned}</div>
          <div class="label">XP</div>
        </div>
        <div class="complete-stat">
          <div class="num">${questionsCorrect}/${questionsTotal}</div>
          <div class="label">Riktig</div>
        </div>
        <div class="complete-stat">
          <div class="num">${heartsLeft}</div>
          <div class="label">Liv</div>
        </div>
      </div>
      <div class="summary-points">
        <h3>Hovedpoeng å huske</h3>
        <ul>
          ${getSummaryPoints(currentLesson).map(p => `<li>${p}</li>`).join('')}
        </ul>
      </div>
    </div>
  `;
  document.getElementById('bottomAction').style.display = 'block';
  const btn = document.getElementById('checkBtn');
  btn.textContent = 'Tilbake til oversikt';
  btn.disabled = false;
  btn.className = 'btn btn-primary';
  btn.onclick = () => closeLesson();

  // Update progress to full
  document.getElementById('progressFill').style.width = '100%';
}

function getSummaryPoints(lesson) {
  // Auto-extract from intro body — strip HTML, take 1-2 sentences
  const body = lesson.intro.body.replace(/<[^>]+>/g, '');
  const sentences = body.split(/(?<=[.!?])\s+/).filter(s => s.length > 20);
  return sentences.slice(0, 3);
}

document.getElementById('closeBtn').addEventListener('click', () => {
  // Mid-question with progress? Show pause modal. Otherwise just close.
  if (currentQIdx >= 0 && currentQIdx < currentLesson.questions.length && questionsTotal > 0) {
    showModal({
      title: 'Pause leksjonen?',
      body: 'Fremgangen din lagres, og du kan fortsette der du slapp neste gang.',
      actions: [
        { label: 'Fortsett', style: 'btn-secondary', onClick: () => {} },
        { label: 'Pause', style: 'btn-primary', onClick: () => {
          closeLesson();
          showToast('Pauset — du kan fortsette senere', 'info');
        }}
      ]
    });
  } else {
    // No progress to lose
    if (currentLesson) clearLessonProgress(currentLesson.id);
    closeLesson();
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  showModal({
    title: 'Nullstille all fremgang?',
    body: 'All XP, streak og fullførte leksjoner slettes. Dette kan ikke angres.',
    actions: [
      { label: 'Avbryt', style: 'btn-secondary', onClick: () => {} },
      { label: 'Slett alt', style: 'btn-danger', onClick: () => {
        storageRemove(STATE_KEY);
        location.reload();
      }}
    ]
  });
});

// Initialize
detectStorage();
if (storageMode !== 'localStorage') {
  showStorageWarning();
}
loadState();
renderTopbar();
renderHomePage();

// Show welcome toast on first ever load
if (Object.keys(state.completedLessons).length === 0 && state.xp === 0) {
  setTimeout(() => {
    showToast('Velkommen! Trykk på første leksjon for å begynne.', 'info');
  }, 600);
}

// Auto-save lesson progress on page hide (mobile users may swipe away)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && currentLesson) {
    saveLessonProgress();
  }
});
window.addEventListener('pagehide', () => {
  if (currentLesson) saveLessonProgress();
});
</script>
</body>
</html>
